name: CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ---------------- BACKEND ----------------
      - name: Install Backend Dependencies
        run: npm install
        working-directory: WAREHOUSING PROJECT/backend

      - name: Run Backend Tests
        run: npm test
        working-directory: WAREHOUSING PROJECT/backend
        env:
          NODE_ENV: test

      - name: Build Backend Docker Image
        run: docker build -t backend .
        working-directory: WAREHOUSING PROJECT/backend

      # ---------------- FRONTEND ----------------
      - name: Install Frontend Dependencies
        run: npm install
        working-directory: WAREHOUSING PROJECT/frontend

      - name: Build Frontend Docker Image
        run: docker build -t frontend .
        working-directory: WAREHOUSING PROJECT/frontend

      # ---------------- DEPLOY ----------------
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/Smart_Warehouse_Management_System/WAREHOUSING\ PROJECT
            git pull origin main
            docker-compose down
            docker-compose up --build -d
