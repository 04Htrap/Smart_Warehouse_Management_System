name: CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ---------------- BACKEND ----------------
      - name: Install Backend Dependencies
        run: npm install
        working-directory: WAREHOUSING PROJECT/backend

      - name: Build Backend Docker Image
        run: docker build -t backend .
        working-directory: WAREHOUSING PROJECT/backend

      # ---------------- FRONTEND ----------------
      - name: Install Frontend Dependencies
        run: npm install
        working-directory: WAREHOUSING PROJECT/frontend

      - name: Build Frontend Docker Image
        run: docker build -t frontend .
        working-directory: WAREHOUSING PROJECT/frontend
