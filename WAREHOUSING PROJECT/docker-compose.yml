version: "3.8"

services:
  db:
    image: postgres:14
    container_name: warehouse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warehouse_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    container_name: warehouse-backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: warehouse_db

  frontend:
    build: ./frontend
    container_name: warehouse-frontend
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  pgdata: